<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TechMart Support — Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1420;
    --panel: #101D2E;
    --panel-raised: #16263B;
    --line: #223349;
    --text: #E7ECF3;
    --text-dim: #8FA1B8;
    --signal: #2DD9C6;
    --signal-dim: #1A5C56;
    --amber: #F5A623;
    --amber-dim: #4A3717;
    --radius: 14px;
    --api-base: "http://localhost:8000";
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background:
      radial-gradient(1200px 600px at 15% -10%, #10233a 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 32px 16px;
  }
  .app {
    width: 100%;
    max-width: 960px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mark {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--signal), #1596A9);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 700;
    color: #06201D;
    flex-shrink: 0;
  }
  .brand h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 18px;
    margin: 0;
    letter-spacing: 0.2px;
  }
  .brand p {
    margin: 0;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .status {
    display: flex; align-items: center; gap: 7px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--signal);
    box-shadow: 0 0 0 3px rgba(45,217,198,0.15);
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }

  .chat-layout {
    display: flex;
    height: 62vh;
    min-height: 420px;
  }

  /* --- Conversation history sidebar --- */
  .sidebar {
    width: 250px;
    flex-shrink: 0;
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.01);
  }
  .sidebar-header {
    padding: 14px;
    border-bottom: 1px solid var(--line);
  }
  #newChatBtn {
    width: 100%;
    background: var(--signal-dim);
    color: var(--signal);
    border: 1px solid #2A7A70;
    border-radius: 9px;
    padding: 9px 10px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    text-align: left;
  }
  #newChatBtn:hover { filter: brightness(1.1); }
  .conversation-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .conversation-list::-webkit-scrollbar { width: 6px; }
  .conversation-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; }
  .conv-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: 1px solid transparent;
    border-radius: 9px;
    padding: 9px 10px;
    cursor: pointer;
    color: var(--text);
  }
  .conv-item:hover { background: var(--panel-raised); }
  .conv-item.active {
    background: var(--panel-raised);
    border-color: var(--signal-dim);
  }
  .conv-item .preview {
    font-size: 12.5px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .conv-item .meta {
    margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .sidebar-empty {
    padding: 16px 12px;
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
  }

  .chat-main {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }

  #log {
    flex: 1;
    overflow-y: auto;
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #log::-webkit-scrollbar { width: 8px; }
  #log::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; }

  .row { display: flex; flex-direction: column; max-width: 82%; }
  .row.user { align-self: flex-end; align-items: flex-end; }
  .row.assistant { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 12px 15px;
    border-radius: 12px;
    font-size: 14.5px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .row.user .bubble {
    background: var(--signal-dim);
    border: 1px solid #2A7A70;
    border-bottom-right-radius: 3px;
  }
  .row.assistant .bubble {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-bottom-left-radius: 3px;
  }
  .row.assistant.escalated .bubble {
    border-color: #6B4A16;
  }

  .routing {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 7px;
  }
  .badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 20px;
    background: transparent;
    border: 1px solid var(--signal-dim);
    color: var(--signal);
  }
  .badge.escalate {
    border-color: var(--amber-dim);
    color: var(--amber);
  }

  .typing {
    display: flex; gap: 4px; padding: 4px 2px;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
    animation: pulse 1.1s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 60%, 100% { opacity: 0.25; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-2px); }
  }

  form#composer {
    display: flex;
    gap: 10px;
    padding: 14px;
    border-top: 1px solid var(--line);
    background: var(--panel);
  }
  #composer input {
    flex: 1;
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14.5px;
    outline: none;
  }
  #composer input:focus { border-color: var(--signal); }
  #composer input::placeholder { color: var(--text-dim); }
  #composer button {
    background: var(--signal);
    color: #06201D;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: filter 0.15s ease;
  }
  #composer button:hover { filter: brightness(1.08); }
  #composer button:disabled { opacity: 0.5; cursor: not-allowed; }

  .hint {
    font-size: 11.5px;
    color: var(--text-dim);
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
  }
  .hint code {
    color: var(--signal);
    background: transparent;
  }

  /* --- Auth gate --- */
  #authScreen {
    display: flex;
    flex-direction: column;
    gap: 16px;
    padding: 28px 26px 26px;
  }
  #authScreen h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    margin: 0 0 2px 0;
  }
  #authScreen p.sub {
    margin: 0;
    font-size: 13px;
    color: var(--text-dim);
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .field input {
    background: var(--panel-raised);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 11px 13px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    outline: none;
  }
  .field input:focus { border-color: var(--signal); }
  #authError {
    font-size: 12.5px;
    color: #F2879A;
    display: none;
  }
  #authSubmit {
    background: var(--signal);
    color: #06201D;
    border: none;
    border-radius: 10px;
    padding: 12px;
    font-family: 'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
  }
  #authSubmit:disabled { opacity: 0.5; cursor: not-allowed; }
  #authToggle {
    background: none;
    border: none;
    color: var(--signal);
    font-size: 12.5px;
    cursor: pointer;
    text-align: center;
    font-family: 'Inter', sans-serif;
    padding: 4px;
  }
  .userbar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .userbar button {
    background: none;
    border: 1px solid var(--line);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 5px 10px;
    font-size: 11.5px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  .userbar button:hover { border-color: var(--signal); color: var(--signal); }
  .hidden { display: none !important; }

  @media (max-width: 620px) {
    .chat-layout { flex-direction: column; height: auto; }
    .sidebar {
      width: 100%;
      max-height: 160px;
      border-right: none;
      border-bottom: 1px solid var(--line);
    }
    #log { height: 50vh; min-height: 320px; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="brand">
      <div class="mark">TM</div>
      <div>
        <h1>TechMart Support</h1>
        <p>Multi-agent assistant · Billing · Technical · Product · Complaints · FAQ</p>
      </div>
    </div>
    <div id="userbar" class="userbar hidden">
      <span id="userGreeting"></span>
      <button id="logoutBtn" type="button">Log out</button>
    </div>
  </header>

  <div class="panel">
    <!-- Auth gate: shown until the visitor logs in or signs up -->
    <div id="authScreen">
      <div>
        <h2 id="authTitle">Log in</h2>
        <p class="sub" id="authSub">Sign in to start a support conversation.</p>
      </div>
      <form id="authForm">
        <div class="field hidden" id="nameField">
          <label for="nameInput">Name</label>
          <input id="nameInput" type="text" autocomplete="name" />
        </div>
        <div class="field">
          <label for="emailInput">Email</label>
          <input id="emailInput" type="email" autocomplete="email" required />
        </div>
        <div class="field">
          <label for="passwordInput">Password</label>
          <input id="passwordInput" type="password" autocomplete="current-password" required minlength="8" />
        </div>
        <p id="authError"></p>
        <button id="authSubmit" type="submit">Log in</button>
      </form>
      <button id="authToggle" type="button">Don't have an account? Sign up</button>
    </div>

    <!-- Chat UI: shown after login -->
    <div id="chatScreen" class="hidden chat-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <button id="newChatBtn" type="button">+ New conversation</button>
        </div>
        <div id="conversationList" class="conversation-list">
          <div class="sidebar-empty">No conversations yet.</div>
        </div>
      </aside>
      <div class="chat-main">
        <div id="log"></div>
        <form id="composer">
          <input id="messageInput" type="text" placeholder="Ask about an order, a refund, a login issue…" autocomplete="off" />
          <button type="submit" id="sendBtn">Send</button>
        </form>
      </div>
    </div>
  </div>

  <p class="hint">Backend expected at <code>http://localhost:8000</code> — start it with <code>uvicorn backend.main:app --reload</code></p>
</div>

<script>
  const API_BASE = "http://localhost:8000";

  // Auth token, current user, and session id are kept in memory only (reset
  // on page refresh). Wire these to your own persistence layer (e.g. a
  // secure cookie set by the backend) if you want login to survive a reload.
  let authToken = null;
  let currentUser = null;
  let sessionId = null;
  let authMode = "login"; // "login" | "signup"

  const authScreen = document.getElementById("authScreen");
  const chatScreen = document.getElementById("chatScreen");
  const userbar = document.getElementById("userbar");
  const userGreeting = document.getElementById("userGreeting");
  const authForm = document.getElementById("authForm");
  const authTitle = document.getElementById("authTitle");
  const authSub = document.getElementById("authSub");
  const authToggle = document.getElementById("authToggle");
  const authSubmit = document.getElementById("authSubmit");
  const authError = document.getElementById("authError");
  const nameField = document.getElementById("nameField");
  const nameInput = document.getElementById("nameInput");
  const emailInput = document.getElementById("emailInput");
  const passwordInput = document.getElementById("passwordInput");

  authToggle.addEventListener("click", () => {
    authMode = authMode === "login" ? "signup" : "login";
    const isSignup = authMode === "signup";
    authTitle.textContent = isSignup ? "Create an account" : "Log in";
    authSub.textContent = isSignup
      ? "Sign up to start a support conversation."
      : "Sign in to start a support conversation.";
    authSubmit.textContent = isSignup ? "Sign up" : "Log in";
    authToggle.textContent = isSignup
      ? "Already have an account? Log in"
      : "Don't have an account? Sign up";
    nameField.classList.toggle("hidden", !isSignup);
    passwordInput.autocomplete = isSignup ? "new-password" : "current-password";
    authError.style.display = "none";
  });

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    authError.style.display = "none";
    authSubmit.disabled = true;

    const endpoint = authMode === "signup" ? "/api/auth/signup" : "/api/auth/login";
    const body = authMode === "signup"
      ? { name: nameInput.value.trim(), email: emailInput.value.trim(), password: passwordInput.value }
      : { email: emailInput.value.trim(), password: passwordInput.value };

    try {
      const res = await fetch(`${API_BASE}${endpoint}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || "Something went wrong. Please try again.");
      }
      authToken = data.access_token;
      currentUser = data.user;
      await enterChat();
    } catch (err) {
      authError.textContent = err.message;
      authError.style.display = "block";
    } finally {
      authSubmit.disabled = false;
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", () => {
    authToken = null;
    currentUser = null;
    sessionId = null;
    document.getElementById("log").innerHTML = "";
    conversationList.innerHTML = '<div class="sidebar-empty">No conversations yet.</div>';
    userbar.classList.add("hidden");
    chatScreen.classList.add("hidden");
    authScreen.classList.remove("hidden");
    passwordInput.value = "";
  });

  async function enterChat() {
    userGreeting.textContent = `Signed in as ${currentUser.name}`;
    userbar.classList.remove("hidden");
    authScreen.classList.add("hidden");
    chatScreen.classList.remove("hidden");
    await loadSessionList({ selectMostRecent: true });
    document.getElementById("messageInput").focus();
  }

  function authHeaders() {
    return authToken ? { Authorization: `Bearer ${authToken}` } : {};
  }
  const log = document.getElementById("log");
  const form = document.getElementById("composer");
  const input = document.getElementById("messageInput");
  const sendBtn = document.getElementById("sendBtn");
  const conversationList = document.getElementById("conversationList");
  const newChatBtn = document.getElementById("newChatBtn");

  function addRow(role, text, meta) {
    const row = document.createElement("div");
    row.className = `row ${role}` + (meta && meta.escalated ? " escalated" : "");

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    row.appendChild(bubble);

    if (meta && (meta.agents_used || []).length) {
      const routing = document.createElement("div");
      routing.className = "routing";
      meta.agents_used.forEach(agent => {
        const b = document.createElement("span");
        b.className = "badge";
        b.textContent = agent;
        routing.appendChild(b);
      });
      if (meta.escalated) {
        const b = document.createElement("span");
        b.className = "badge escalate";
        b.textContent = "escalated";
        routing.appendChild(b);
      }
      row.appendChild(routing);
    }

    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
    return row;
  }

  function addTypingIndicator() {
    const row = document.createElement("div");
    row.className = "row assistant";
    row.id = "typing-row";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    row.appendChild(bubble);
    log.appendChild(row);
    log.scrollTop = log.scrollHeight;
  }

  function removeTypingIndicator() {
    const row = document.getElementById("typing-row");
    if (row) row.remove();
  }

  function timeAgo(isoString) {
    const diffMs = Date.now() - new Date(isoString).getTime();
    const mins = Math.floor(diffMs / 60000);
    if (mins < 1) return "just now";
    if (mins < 60) return `${mins}m ago`;
    const hours = Math.floor(mins / 60);
    if (hours < 24) return `${hours}h ago`;
    return `${Math.floor(hours / 24)}d ago`;
  }

  function renderSessionList(sessions) {
    conversationList.innerHTML = "";
    if (!sessions.length) {
      conversationList.innerHTML = '<div class="sidebar-empty">No conversations yet — send a message to start one.</div>';
      return;
    }
    sessions.forEach(s => {
      const item = document.createElement("button");
      item.type = "button";
      item.className = "conv-item" + (s.session_id === sessionId ? " active" : "");
      item.dataset.sessionId = s.session_id;
      item.innerHTML = `
        <div class="preview"></div>
        <div class="meta">${s.message_count} msg · ${timeAgo(s.last_activity)}</div>
      `;
      item.querySelector(".preview").textContent = s.preview;
      item.addEventListener("click", () => selectSession(s.session_id));
      conversationList.appendChild(item);
    });
  }

  async function refreshSidebarPreservingSelection() {
    try {
      const res = await fetch(`${API_BASE}/api/sessions`, { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      renderSessionList(data.sessions);
      highlightActiveConversation();
    } catch (err) {
      console.error("Failed to refresh conversation list", err);
    }
  }

  async function loadSessionList({ selectMostRecent = false } = {}) {
    try {
      const res = await fetch(`${API_BASE}/api/sessions`, { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      renderSessionList(data.sessions);
      if (selectMostRecent) {
        if (data.sessions.length) {
          await selectSession(data.sessions[0].session_id);
        } else {
          startNewChat({ greet: true });
        }
      }
    } catch (err) {
      console.error("Failed to load conversation list", err);
    }
  }

  async function selectSession(id) {
    sessionId = id;
    log.innerHTML = "";
    highlightActiveConversation();
    try {
      const res = await fetch(`${API_BASE}/api/history/${id}`, { headers: authHeaders() });
      if (!res.ok) throw new Error("Failed to load conversation.");
      const data = await res.json();
      if (!data.turns.length) {
        addRow("assistant", "Hi, I'm the TechMart support assistant. Ask me about orders, billing, technical issues, products, or anything else — I'll route you to the right specialist.");
      }
      data.turns.forEach(t => {
        addRow(t.role, t.content, { agents_used: t.agents_used, escalated: t.escalated });
      });
    } catch (err) {
      console.error(err);
      addRow("assistant", "Couldn't load that conversation. Please try again.");
    }
    input.focus();
  }

  function highlightActiveConversation() {
    [...conversationList.querySelectorAll(".conv-item")].forEach(el => {
      el.classList.toggle("active", el.dataset.sessionId === sessionId);
    });
  }

  function startNewChat({ greet = true } = {}) {
    sessionId = null;
    log.innerHTML = "";
    highlightActiveConversation();
    if (greet) {
      addRow("assistant", "Hi, I'm the TechMart support assistant. Ask me about orders, billing, technical issues, products, or anything else — I'll route you to the right specialist.");
    }
    input.focus();
  }

  newChatBtn.addEventListener("click", () => startNewChat({ greet: true }));

  async function ensureSession() {
    if (sessionId) return sessionId;
    const res = await fetch(`${API_BASE}/api/session`, {
      method: "POST",
      headers: authHeaders(),
    });
    if (res.status === 401) throw new Error("SESSION_EXPIRED");
    const data = await res.json();
    sessionId = data.session_id;
    return sessionId;
  }

  async function sendMessage(message) {
    await ensureSession();
    const res = await fetch(`${API_BASE}/api/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json", ...authHeaders() },
      body: JSON.stringify({ session_id: sessionId, message }),
    });
    if (res.status === 401) throw new Error("SESSION_EXPIRED");
    if (!res.ok) throw new Error(`Request failed: ${res.status}`);
    return res.json();
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;

    addRow("user", text);
    input.value = "";
    sendBtn.disabled = true;
    addTypingIndicator();

    try {
      const data = await sendMessage(text);
      removeTypingIndicator();
      addRow("assistant", data.reply, {
        agents_used: data.agents_used,
        escalated: data.escalated,
      });
      refreshSidebarPreservingSelection();
    } catch (err) {
      removeTypingIndicator();
      if (err.message === "SESSION_EXPIRED") {
        addRow("assistant", "Your session has expired. Please log in again.");
        setTimeout(() => document.getElementById("logoutBtn").click(), 1200);
      } else {
        addRow("assistant", "I couldn't reach the support backend. Make sure it's running at http://localhost:8000 and try again.");
      }
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  });
</script>
</body>
</html>
